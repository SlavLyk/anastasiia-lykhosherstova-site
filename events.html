<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events — Anastasiia Lykhosherstova</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .events-page { padding: 0 72px 96px; }

    .events-intro-row {
      padding: 52px 0 40px;
      margin-bottom: 44px;
      border-bottom: 1px solid var(--gd-12);
    }
    .events-sub {
      font-size: 21px; line-height: 1.8;
      color: var(--tx-55);
      max-width: 560px;
    }

    /* Event list */
    .events-list { margin-top: 0; }
    .event-row {
      display: grid;
      grid-template-columns: 110px 1fr auto;
      gap: 32px; align-items: center;
      padding: 32px 32px;
      background: var(--charcoal);
      margin-bottom: 2px;
      position: relative;
      transition: background 0.22s, padding-left 0.22s;
    }
    .event-row::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 2px;
      background: var(--gold);
      transform: scaleY(0); transform-origin: bottom;
      transition: transform 0.3s ease;
    }
    .event-row:hover::before { transform: scaleY(1); }
    .event-row:hover { background: var(--mid); padding-left: 40px; }

    .event-date-box {
      text-align: center;
      padding: 12px;
      border: 1px solid var(--gd-15);
    }
    .event-date-day {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px; font-weight: 300;
      color: var(--gold); line-height: 1;
    }
    .event-date-month {
      font-size: 21px; letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--tx-40);
      margin-top: 4px;
    }
    .event-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 400;
      color: var(--ivory); margin-bottom: 6px;
    }
    .event-location {
      font-size: 21px; color: var(--tx-38);
      letter-spacing: 0.06em;
    }
    .event-link {
      justify-self: end;
      font-size: 15px; letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--tx-55);
      text-decoration: none;
      border: 1px solid var(--gd-30);
      padding: 13px 28px;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .event-link:hover {
      color: var(--gold);
      border-color: var(--gold);
      background: var(--gd-08);
    }

    .events-loading {
      padding: 48px 0;
      font-size: 21px; letter-spacing: 0.08em;
      color: var(--tx-30);
      font-family: 'Jost', sans-serif;
    }
    .events-msg {
      padding: 40px 0;
      color: var(--tx-35);
      font-family: 'Jost', sans-serif;
      font-size: 21px;
    }
    @media (max-width: 860px) {
      .events-page { padding: 0 28px 72px; }
      .events-intro-row { padding: 36px 0 28px; margin-bottom: 32px; }
      .event-row { grid-template-columns: 80px 1fr; padding: 24px 20px; }
      .event-link { grid-column: 1 / -1; justify-self: start; margin-top: 8px; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="page-hero">
    <div class="page-eyebrow reveal">Calendar</div>
    <h1 class="reveal">Upcoming <em>Events</em></h1>
  </div>

  <div class="events-page">

    <div class="events-intro-row">
      <p class="events-sub reveal">Upcoming public performances and bookings. For private event enquiries, please get in touch directly.</p>
    </div>

    <div class="events-list" id="eventsList">
      <div class="events-loading">Loading events...</div>
    </div>

  </div>

</div>
<script src="shared.js"></script>
<script>
  // ── NOTION EVENTS INTEGRATION ──────────────────────────────────────────
  // Events are fetched from /api/events (a Vercel serverless function)
  // which securely talks to Notion. To add events, open Notion and edit
  // the "Anastasiia Lykhosherstova — Events" database. Tick "Visible on Site"
  // to make an event appear here.

  async function loadEvents() {
    const list   = document.getElementById('eventsList');
    const today  = new Date().toISOString().split('T')[0];

    try {
      const res    = await fetch('/api/events');
      const events = await res.json();

      const upcoming = events.filter(e => e.date >= today);

      // Render upcoming
      list.innerHTML = upcoming.length ? upcoming.map(renderEventRow).join('') : '<p class="events-msg">No upcoming events scheduled at this time.</p>';

    } catch (err) {
      // Fallback: show placeholder message
      list.innerHTML = '<p class="events-msg">Events loading, please check back soon.</p>';
      console.warn('Notion fetch failed. Have you set NOTION_TOKEN and set up a proxy?', err);
    }
  }

  function formatDate(iso) {
    if (!iso) return {day:'—',month:'—'};
    const d = new Date(iso + 'T00:00:00');
    return {
      day:   d.getDate().toString().padStart(2,'0'),
      month: d.toLocaleDateString('en-GB',{month:'short',year:'numeric'}),
    };
  }

  function renderEventRow(e) {
    const {day, month} = formatDate(e.date);
    return `
      <div class="event-row">
        <div class="event-date-box">
          <div class="event-date-day">${day}</div>
          <div class="event-date-month">${month}</div>
        </div>
        <div>
          <div class="event-name">${e.name}</div>
          <div class="event-location">${e.loc}</div>
        </div>
        <a href="contact.html" class="event-link">Enquire →</a>
      </div>`;
  }

  loadEvents();
</script>
</body>
</html>
